name: Release Chrome extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: chrome-extension-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: chrome-web-store
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4

      - name: Validate release tag and set manifest version
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use vMAJOR.MINOR.PATCH, got: $RELEASE_TAG" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          export RELEASE_VERSION="$version"
          node --input-type=module -e '
            import fs from "node:fs";
            const path = "public/manifest.json";
            const manifest = JSON.parse(fs.readFileSync(path, "utf8"));
            manifest.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          '

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build extension
        run: pnpm build

      - name: Validate Free extension manifest
        run: pnpm validate:manifest

      - name: Validate Vietnamese normalizer assets and ONNX Runtime packaging
        run: pnpm validate:vi-assets:release

      - name: Validate third-party notices
        run: |
          set -euo pipefail
          test -s dist/THIRD_PARTY_NOTICES.txt
          grep -Fq 'OpenRAIL-M License' dist/THIRD_PARTY_NOTICES.txt
          grep -Fq 'https://huggingface.co/Supertone/supertonic-3/blob/main/LICENSE' dist/THIRD_PARTY_NOTICES.txt

      - name: Run unit tests
        run: pnpm test:unit

      - name: Evaluate Vietnamese normalization corpus
        run: pnpm evaluate:vi

      - name: Run extension E2E tests
        run: xvfb-run --auto-servernum pnpm test:e2e

      - name: Package extension
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          archive="readit.dev-${RELEASE_VERSION}.zip"
          (cd dist && zip -qr "../$archive" . -x '*.DS_Store')
          pnpm validate:release-zip "$archive"
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "$archive" --clobber
          else
            gh release create "${{ github.ref_name }}" "$archive" \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi

      - name: Refresh Chrome Web Store access token
        id: cws-token
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error \
            -X POST https://oauth2.googleapis.com/token \
            -d "client_id=$CWS_CLIENT_ID" \
            -d "client_secret=$CWS_CLIENT_SECRET" \
            -d "refresh_token=$CWS_REFRESH_TOKEN" \
            -d 'grant_type=refresh_token')"
          access_token="$(jq -er '.access_token' <<< "$response")"
          echo "::add-mask::$access_token"
          echo "access_token=$access_token" >> "$GITHUB_OUTPUT"

      - name: Upload package to Chrome Web Store
        env:
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_ACCESS_TOKEN: ${{ steps.cws-token.outputs.access_token }}
        run: |
          set -euo pipefail
          base="https://chromewebstore.googleapis.com"
          name="publishers/$CWS_PUBLISHER_ID/items/$CWS_EXTENSION_ID"
          echo "Uploading $archive to Chrome Web Store..."
          upload_response="$(curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $CWS_ACCESS_TOKEN" \
            --data-binary "@$archive" \
            "$base/upload/v2/$name:upload")"
          echo "Upload response:"
          echo "$upload_response" | jq .

      - name: Wait for Chrome Web Store upload
        env:
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_ACCESS_TOKEN: ${{ steps.cws-token.outputs.access_token }}
        run: |
          set -euo pipefail
          base="https://chromewebstore.googleapis.com"
          name="publishers/$CWS_PUBLISHER_ID/items/$CWS_EXTENSION_ID"
          max_attempts=60
          for attempt in $(seq 1 $max_attempts); do
            status="$(curl --fail-with-body --silent --show-error \
              -H "Authorization: Bearer $CWS_ACCESS_TOKEN" \
              "$base/v2/$name:fetchStatus")"
            state="$(jq -r '.lastAsyncUploadState // "UNKNOWN"' <<< "$status")"
            echo "Attempt $attempt/$max_attempts — state: $state"
            case "$state" in
              SUCCEEDED)
                echo "Upload succeeded."
                exit 0
                ;;
              FAILED)
                echo "Upload failed:" >&2
                echo "$status" | jq . >&2
                exit 1
                ;;
              NOT_FOUND)
                echo "Item not found:" >&2
                echo "$status" | jq . >&2
                exit 1
                ;;
              IN_PROGRESS)
                sleep 10
                ;;
              *)
                echo "Unknown state '$state', treating as in-progress. Response:" >&2
                echo "$status" | jq . >&2
                sleep 10
                ;;
            esac
          done
          echo "Timed out after $((max_attempts * 10))s waiting for Chrome Web Store upload." >&2
          echo "Last state: $state" >&2
          echo "$status" | jq . >&2
          exit 1

      - name: Submit package for publication
        env:
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_ACCESS_TOKEN: ${{ steps.cws-token.outputs.access_token }}
        run: |
          set -euo pipefail
          base="https://chromewebstore.googleapis.com"
          name="publishers/$CWS_PUBLISHER_ID/items/$CWS_EXTENSION_ID"
          publish_response="$(curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $CWS_ACCESS_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"publishType":"DEFAULT_PUBLISH","blockOnWarnings":true}' \
            "$base/v2/$name:publish")"

          echo "Publish response:"
          echo "$publish_response" | jq .

          # Extract status codes from response
          statuses="$(jq -r '.status // [] | .[]' <<< "$publish_response" 2>/dev/null || echo "")"

          if echo "$statuses" | grep -q 'OK'; then
            echo "✅ Published successfully."
          elif echo "$statuses" | grep -q 'ITEM_PENDING_REVIEW'; then
            echo "⏳ Published but pending Chrome Web Store review (e.g. permission changes)."
            echo "The extension will go live automatically once the review is approved."
          elif echo "$statuses" | grep -q 'PUBLISHED_WITH_FRICTION_WARNING'; then
            echo "⚠️ Published with friction warnings. Check the Developer Dashboard for details."
          else
            echo "Publish status: $statuses"
            # If no explicit error status, check for error fields
            has_error="$(jq -r '.error // empty' <<< "$publish_response" 2>/dev/null || echo "")"
            if [ -n "$has_error" ]; then
              echo "❌ Publish failed:" >&2
              echo "$publish_response" | jq . >&2
              exit 1
            fi
            echo "✅ Publish request accepted."
          fi

